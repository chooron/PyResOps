# Instruction-conditioned static extension — Stage 2 workflow replication
# Tankeng Reservoir
# Inherits all settings from stage1_instruction_static.yml and adds oracle reference.

extension_type: instruction_conditioned_static

data:
  root: data
  event_list: experiments/config/stage1_event_list_41.txt

release_families:
  - constant_release
  - inflow_piecewise_constant_release
  - inflow_linear_release
  - storage_piecewise_constant_release
  - storage_nonlinear_release
  - joint_driven_release

operation_intervals_h: [6, 12]

# Tankeng flood-limit levels (m)
flood_limits:
  meixun: 160.0
  taixun: 156.5
  absolute_ceiling: 161.5

# Tankeng downstream routing — Muskingum method to Hecheng station
downstream:
  muskingum_k_h: 5
  muskingum_x: 0.2
  dt_h: 3
  safety_limit_m3s: 14000

# Stage 1 extension oracle for comparison
stage1_oracle_dir: experiments/results/stage1_instruction_static

# Oracle tolerance thresholds (same as main Stage 2)
oracle_tolerances:
  max_level_m: 0.5
  terminal_deviation_m: 0.5
  peak_reduction_rate: 0.05
